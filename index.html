<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Behind The Lyrics</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="brand-symbol" aria-hidden="true">🔍♪</div>
        <div class="hero-copy">
          <h1 class="brand-title">Behind The Lyrics</h1>
          <p>Discover the meaning behind the music.</p>
        </div>
      </header>

      <section class="toolbar" aria-label="Import, export and search">
        <label class="search-field">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Artist, album or song">
        </label>

        <details class="admin-panel">
          <summary>Admin tools</summary>
          <div class="actions">
            <button id="openJsonButton" class="secondary-button" type="button">Open songs.json</button>
            <label class="file-button">
              Import CSV/M3U
              <input id="fileInput" type="file" accept=".csv,.m3u,.m3u8,text/csv,audio/x-mpegurl">
            </label>
            <button id="saveJsonButton" class="secondary-button" type="button">Save songs.json</button>
            <button id="exportButton" class="secondary-button" type="button">Download copy</button>
            <button id="clearButton" class="ghost-button" type="button">Clear data</button>
          </div>
        </details>
      </section>

      <section class="status-panel" aria-live="polite">
        <p id="statusText">Loading songs.json...</p>
      </section>

      <section id="library" class="library" aria-label="Imported music library"></section>
    </main>

    <script src="app.js?v=20260615-interpretations"></script>
  </body>
</html>
